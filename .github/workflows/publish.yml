name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC). No API token or stored secret is needed: PyPI verifies the
# release came from this repo's workflow. Configure the trusted publisher once at
# https://pypi.org/manage/account/publishing/ (project gatekeeper-scanner, owner
# skyblueso, repo gatekeeper, workflow publish.yml).

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
